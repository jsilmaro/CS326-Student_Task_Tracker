services:
  # Backend API
  - type: web
    name: taskflow-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 3001

  # Frontend
  - type: web
    name: taskflow-frontend
    runtime: static
    buildCommand: pnpm install && pnpm build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false
